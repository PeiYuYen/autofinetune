name: autofinetune
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
    # PyTorch (CUDA 12.8)
    - torch==2.9.1+cu128 --index-url https://download.pytorch.org/whl/cu128
    - triton==3.5.1
    # AutoFinetune core
    - transformers==5.3.0
    - peft==0.18.1
    - trl==0.29.1
    - accelerate==1.13.0
    - bitsandbytes==0.49.2
    - datasets==4.8.3
    - sentencepiece==0.2.1
    - tokenizers==0.22.2
    - safetensors==0.7.0
    - huggingface-hub>=0.27.0
    # Evaluation
    - lm-eval==0.4.11
    - evalplus==0.3.1
    # HPO baseline
    - optuna==4.8.0
    # AutoResearch (pretraining)
    - kernels==0.12.3
    - tiktoken==0.12.0
    - rustbpe==0.1.0
    # General utilities
    - numpy==2.2.6
    - pandas==2.3.3
    - matplotlib==3.10.8
    - pyarrow==23.0.1
    - requests==2.32.5
